<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
        }

        table {
            width: 100%;
        }

        td {
            padding: 8px;
        }

        input {
            width: 100%;
            padding: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: darkgreen;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .fraud {
            color: red;
        }

        .normal {
            color: green;
        }
    </style>
</head>

<body>
    <a href="/logout">
    <button style="float:right; background:red; color:white; padding:8px;">
        Logout
    </button>
</a>

<div class="container">

    <h2>Smart Fraud Detection</h2>

    <form method="POST" action="/check">
        <table>
            <tr>
                <td>Amount</td>
                <td><input type="number" name="amount" required></td>
            </tr>

            <tr>
                <td>Old Balance</td>
                <td><input type="number" name="old_balance" required></td>
            </tr>

            <tr>
                <td>New Balance</td>
                <td><input type="number" name="new_balance" required></td>
            </tr>

            <tr>
                <td colspan="2">
                    <button type="submit">Check Fraud</button>
                </td>
            </tr>
        </table>
    </form>

    <!-- RESULT DISPLAY -->
  <!-- RESULT DISPLAY -->
{% if result %}

    {% if result == "FRAUD" %}
        <div class="result fraud">
            🚨 Fraud Transaction Detected
        </div>
    {% else %}
        <div class="result normal">
            ✅ Transaction is Safe
        </div>
    {% endif %}

    <div style="margin-top:10px; font-size:18px;">
        <b>Risk Score:</b> {{ risk_score }}%
    </div>

{% endif %}  

</div>

</body>
</html>
